# PrusaSlicer profile — Elegoo Neptune 4 Pro (Fast Print)
# Klipper firmware, direct drive, 225x225x265mm

# ── Printer ──
bed_shape = 0x0,225x0,225x225,0x225
max_print_height = 265
nozzle_diameter = 0.4
gcode_flavor = klipper
thumbnails = 32x32,220x124
thumbnails_format = PNG

# ── Print Settings (thicker layers, less infill) ──
layer_height = 0.28
first_layer_height = 0.28
perimeters = 2
top_solid_layers = 3
bottom_solid_layers = 3
fill_density = 10%
fill_pattern = grid
infill_every_layers = 1

# ── Speed (higher) ──
perimeter_speed = 200
external_perimeter_speed = 150
infill_speed = 200
solid_infill_speed = 200
top_solid_infill_speed = 100
first_layer_speed = 60
travel_speed = 300
travel_speed_z = 10

# ── Temperature (PLA) ──
temperature = 215
first_layer_temperature = 220
bed_temperature = 60
first_layer_bed_temperature = 60

# ── Retraction (Direct Drive) ──
retract_length = 0.8
retract_speed = 40
deretract_speed = 40
retract_lift = 0.2

# ── Cooling ──
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100
bridge_fan_speed = 100
disable_fan_first_layers = 1

# ── Support (from build plate only) ──
support_material = 1
support_material_auto = 1
support_material_threshold = 45
support_material_enforce_layers = 0
support_material_buildplate_only = 1
support_material_pattern = rectilinear
support_material_spacing = 2
support_material_angle = 0
support_material_interface_layers = 2
support_material_contact_distance = 0.2

# ── Skirt ──
skirts = 1
skirt_distance = 3
skirt_height = 1

# ── Start/End G-code ──
start_gcode = START_PRINT EXTRUDER_TEMP={first_layer_temperature[0]} BED_TEMP={first_layer_bed_temperature[0]}
end_gcode = END_PRINT
