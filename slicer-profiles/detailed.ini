# PrusaSlicer profile — Elegoo Neptune 4 Pro (High Detail)
# Klipper firmware, direct drive, 225x225x265mm

# ── Printer ──
bed_shape = 0x0,225x0,225x225,0x225
max_print_height = 265
nozzle_diameter = 0.4
gcode_flavor = klipper

# ── Print Settings (fine layers, more walls) ──
layer_height = 0.12
first_layer_height = 0.2
perimeters = 4
top_solid_layers = 6
bottom_solid_layers = 5
fill_density = 20%
fill_pattern = grid
infill_every_layers = 1

# ── Speed (slower for quality) ──
perimeter_speed = 100
external_perimeter_speed = 60
infill_speed = 120
solid_infill_speed = 100
top_solid_infill_speed = 50
first_layer_speed = 30
travel_speed = 250
travel_speed_z = 10

# ── Temperature (PLA) ──
temperature = 210
first_layer_temperature = 215
bed_temperature = 60
first_layer_bed_temperature = 60

# ── Retraction (Direct Drive) ──
retract_length = 0.8
retract_speed = 40
deretract_speed = 40
retract_lift = 0.2

# ── Cooling ──
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100
bridge_fan_speed = 100
disable_fan_first_layers = 2

# ── Support ──
support_material = 1
support_material_auto = 1
support_material_buildplate_only = 1
support_material_pattern = rectilinear
support_material_spacing = 2
support_material_angle = 0
support_material_interface_layers = 2

# ── Skirt ──
skirts = 1
skirt_distance = 3
skirt_height = 1

# ── Start/End G-code ──
start_gcode = START_PRINT EXTRUDER_TEMP={first_layer_temperature[0]} BED_TEMP={first_layer_bed_temperature[0]}
end_gcode = END_PRINT
