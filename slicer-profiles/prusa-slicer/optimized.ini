# PrusaSlicer profile — Elegoo Neptune 4 Pro (Optimized)
# Klipper firmware, direct drive, 225x225x265mm

# ── Printer ──
bed_shape = 0x0,225x0,225x225,0x225
max_print_height = 265
nozzle_diameter = 0.4
gcode_flavor = klipper
thumbnails = 32x32,220x124
thumbnails_format = PNG

# ── Print Settings ──
layer_height = 0.3
first_layer_height = 0.3
perimeters = 2
top_solid_layers = 4
bottom_solid_layers = 2
fill_density = 10%
fill_pattern = gyroid
infill_every_layers = 1
solid_infill_below_area = 4
infill_overlap = 15%
detect_thin_walls = 0
avoid_crossing_perimeters = 0
perimeter_generator = arachne
extrusion_width = 0.5

# ── Speed ──
perimeter_speed = 300
external_perimeter_speed = 150
infill_speed = 300
solid_infill_speed = 200
top_solid_infill_speed = 150
first_layer_speed = 70
travel_speed = 500
travel_speed_z = 10
max_print_speed = 500

# ── Acceleration (Klipper N4 Pro + Input Shaping) ──
default_acceleration = 5000
perimeter_acceleration = 4000
infill_acceleration = 8000

# ── Layer Time ──
slowdown_below_layer_time = 5

# ── Temperature (PLA) ──
temperature = 215
first_layer_temperature = 220
bed_temperature = 60
first_layer_bed_temperature = 60

# ── Retraction (Direct Drive) ──
retract_length = 0.8
retract_speed = 50
deretract_speed = 50
retract_lift = 0.2

# ── Cooling ──
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100
bridge_fan_speed = 100
disable_fan_first_layers = 1

# ── Support (Tree Organic, from build plate only) ──
support_material = 1
support_material_auto = 1
support_material_style = organic
support_material_threshold = 45
support_material_enforce_layers = 0
support_material_buildplate_only = 1
support_material_pattern = rectilinear
support_material_spacing = 4
support_material_angle = 0
support_material_interface_layers = 0
support_material_contact_distance = 0.28
support_material_bottom_contact_distance = 0.28
support_material_xy_spacing = 0.5
support_material_speed = 350
support_material_with_sheath = 0
dont_support_bridges = 1

# ── Tree Support Tuning (matches Elegoo defaults) ──
support_tree_angle_slow = 35
support_tree_angle = 60
support_tree_branch_diameter = 2
support_tree_top_rate = 30%

# ── Ironing ──
ironing = 0
ironing_type = top
ironing_flowrate = 15%
ironing_spacing = 0.1
ironing_speed = 120

# ── Brim/Skirt ──
skirts = 0
brim_width = 0

# ── Start/End G-code ──
start_gcode = START_PRINT EXTRUDER_TEMP={first_layer_temperature[0]} BED_TEMP={first_layer_bed_temperature[0]}
end_gcode = END_PRINT
