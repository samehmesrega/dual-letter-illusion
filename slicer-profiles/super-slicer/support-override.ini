# Support override — loaded AFTER main profile to force support on
support_material = 1
support_material_auto = 1
support_material_threshold = 89
support_material_enforce_layers = 0
support_material_buildplate_only = 1
support_material_pattern = rectilinear
support_material_spacing = 2
support_material_angle = 0
support_material_interface_layers = 3
support_material_interface_spacing = 0
support_material_contact_distance = 0.2
support_material_bottom_contact_distance = 0
support_material_closing_radius = 2
support_material_synchronize_layers = 0
support_material_extrusion_width = 0.45
dont_support_bridges = 0
brim_width = 5
brim_type = outer_only
skirts = 0


# Extrusion widths (needed for support width calculation)
extrusion_width = 0.45
first_layer_extrusion_width = 0.45
perimeter_extrusion_width = 0.45
infill_extrusion_width = 0.45
solid_infill_extrusion_width = 0.45
top_infill_extrusion_width = 0.45
external_perimeter_extrusion_width = 0.45

# Start G-code: purge line after START_PRINT
start_gcode = START_PRINT EXTRUDER_TEMP={first_layer_temperature[0]} BED_TEMP={first_layer_bed_temperature[0]}\nG92 E0\nG1 Z2 F3000\nG1 X5 Y5 F5000\nG1 Z0.3 F1500\nG1 X120 Y5 E15 F1500\nG1 X120 Y5.4 F5000\nG1 X5 Y5.4 E30 F1500\nG92 E0\nG1 Z2 F3000

# Filament (needed to avoid warnings)
filament_diameter = 1.75
